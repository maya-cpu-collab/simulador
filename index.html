<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Abeja Científica</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <h1>Abeja Científica</h1>

    <!-- EJERCICIO 1 -->
    <form class="caja" onsubmit="calcularTemperatura(); return false;">

        <h2>Transferencia de Calor</h2>

        <label for="T0">Temperatura inicial:</label>
        <input type="number" id="T0" value="" required>

        <label for="Ts">Temperatura del entorno:</label>
        <input type="number" id="Ts" value="" required>

        <label for="k">Constante k:</label>
        <input type="number" id="k" value="0.45" step="0.01" min="0" required>

        <label for="t">Tiempo en horas:</label>
        <input type="number" id="t" value="" min="0" required>

        <button type="submit">Calcular</button>

      
        <p id="resultado1" class="resultado"></p>

    </form>

    <!-- EJERCICIO 2 -->
    <form class="caja" onsubmit="calcularCombinaciones(); return false;">

        <h2>Combinaciones</h2>

        <label for="n1">Total del grupo 1:</label>
        <input type="number" id="n1" value="" min="1" required>

        <label for="r1">Integrantes del subgrupo 1:</label>
        <input type="number" id="r1" value="" min="1" required>

        <label for="n2">Total del grupo 2:</label>
        <input type="number" id="n2" value="" min="1" required>

        <label for="r2">Integrantes del subgrupo 2:</label>
        <input type="number" id="r2" value="" min="1" required>

        <button type="submit">Calcular</button>

        <p id="resultado2" class="resultado"></p>

    </form>

    <script>

        // EJERCICIO 1
        function calcularTemperatura() {
            let T0 = Number(document.getElementById("T0").value);
            let Ts = Number(document.getElementById("Ts").value);
            let k  = Number(document.getElementById("k").value);
            let t  = Number(document.getElementById("t").value);

            let T = Ts + (T0 - Ts) * Math.exp(-k * t);
            T = Math.round(T);

            document.getElementById("resultado1").innerHTML =
                "Temperatura final: " + T + " °C";
        }

        // FACTORIAL
        function factorial(numero) {
            let resultado = 1;
            for (let i = 1; i <= numero; i++) {
                resultado = resultado * i;
            }
            return resultado;
        }

        // EJERCICIO 2
        function calcularCombinaciones() {
            let n1 = Number(document.getElementById("n1").value);
            let r1 = Number(document.getElementById("r1").value);
            let n2 = Number(document.getElementById("n2").value);
            let r2 = Number(document.getElementById("r2").value);

            if (r1 > n1 || r2 > n2) {
                document.getElementById("resultado2").innerHTML =
                    "Error: r no puede ser mayor que n";
            } else {
                let c1 = factorial(n1) / (factorial(r1) * factorial(n1 - r1));
                let c2 = factorial(n2) / (factorial(r2) * factorial(n2 - r2));
                let total = c1 * c2;

                // ✅ FIX 6: toLocaleString() formatea con separadores de miles
                document.getElementById("resultado2").innerHTML =
                    "Total de combinaciones: " + total.toLocaleString("es-BO");
            }
        }

    </script>

</body>
</html>
